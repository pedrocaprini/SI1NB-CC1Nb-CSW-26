<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">

    <title>Aula 02 - Aula Imagens</title>

</head>
<body>

    <h1>Desafio das imagens</h1>
    <h2>Nome da minha cidade é Itapemirim-ES</h2>
    <img src="Itapemirim_es.jpg" width="70%" height="300px" alt="Foto aérea da cidade Itapemirim-ES">
    <hr>
    <h2>Outra foto da minha cidade Itapemirim-ES, agora com legenda</h2>

    <figure>
        <img src="itapemirim_imagem_2.jpg" alt="Itapemirim cidade vista do porto." width="70%" height="300px">
        <figcaption> Legenda para a foto do porto em Itapemirim-ES </figcaption>
    </figure>
    
    <hr>
    <h2>Outra foto da minha cidade Itapemirim-ES , agora com alteração de tamanho</h2>
    <picture>
        <source media="(max-width: 760px )" srcset="itapemirim_imagem_3.jpg" sizes="300px" >
        <img src="praia_a_noite.jpg" alt="Foto do píer da praia de itaipava a noite" width="70%" height="300px">
    </picture>
    

</body>
</html>
